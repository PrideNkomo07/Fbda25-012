<!DOCTYPE html> 

<html lang="en"> 

<head> 

  <meta charset="UTF-8"> 

  <meta name="viewport" content="width=device-width, initial-scale=1.0"> 

  <title>Feedback Hub | Your Voice Shapes Innovation</title> 

  <!--Bootstrap CSS-->

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"> 

  <!--Custom CSS-->

  <link rel="stylesheet" href="css/styles.css"> 

  <!--Google Fonts--> 

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap"> 

</head> 

<body> 

  <!--Navigation-->

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark"> 

    <div class="container"> 
      
      <!--Logo+Brand-->
      <a class="navbar-brand fw-bold" href="index.html">
        <img src="images/logo.png" alt="Cognivault Logo" width="40" height="40" class="me-2">
        Cognivault
      </a>

      <!--Toggler-->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"> 

        <span class="navbar-toggler-icon"></span> 

      </button> 
      

      <div class="collapse navbar-collapse" id="navMenu"> 

        <ul class="navbar-nav ms-auto"> 

          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li> 

          <li class="nav-item"><a class="nav-link" href="services.html">Services</a></li> 

          <li class="nav-item"><a class="nav-link" href="gallery.html">Gallery</a></li> 

          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li> 

          <li class="nav-item"><a class="nav-link active" href="feedback.html">Feedback</a></li> 
          
          <li class="nav-item"><a class="nav-link" href="blog.html">Blog</a></li>
          
          <li class="nav-item"><a class="nav-link" href="faq.html">FAQ</a></li> 

        </ul> 

      </div> 

    </div> 

  </nav> 

  <!--Hero Section-->
  <section class="hero text-center py-5 bg-light"> 
        <img src="images/logo.png" alt="Cognivault Logo" width="300" height="300" loading="lazy">
    <div class="container">
        <h2 class="display-5 fw-bold">Your Voices Shapes Our Future</h2>
        <p class="lead">Share your thoughts to help us improve and grow.</p>
    </div>
  </section>

  <!--Feedback Form-->

  <section class="py-5"> 

    <div class="container"> 

      <h2 class="mb-4 text-center">We Value Your Feedback</h2> 

      <form> 

        <div class="mb-3"> 

          <label for="name" class="form-label">Full Name</label> 

          <input type="text" class="form-control" id="name" placeholder="Enter your name" required> 

        </div> 

        <div class="mb-3"> 

          <label for="email" class="form-label">Email Address</label> 

          <input type="email" class="form-control" id="email" placeholder="Enter your email" required> 

        </div> 

        <div class="mb-3"> 

          <label for="feedback" class="form-label">Your Feedback</label> 

          <textarea class="form-control" id="feedback" rows="4" placeholder="Write your feedback here..." required></textarea> 

        </div> 

        <button type="submit" class="btn btn-primary">Submit Feedback</button> 

      </form> 

    </div> 

  </section> 

 

  <!--Footer-->

  <footer class="bg-dark text-white text-center py-3"> 
    
    <img src="images/logo.png" alt="Cognivault Logo" width="40" height="40" class="mb-2" loading="lazy">

    <p>&copy; 2026 Cognivault | Designed by a Computing Student</p> 

  </footer> 

  <!--Bootstrap JS Bundle-->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script> 
    
  <!--JavaScript link-->
  <script src="js/script.js"></script>
    
</body> 

</html>
